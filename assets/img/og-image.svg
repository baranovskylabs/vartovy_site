<!--
  Vartovy OG image (Open Graph / Twitter Card).
  1200×630 SVG. Перетворюйте на PNG перед публікацією:
    npx svgexport assets/img/og-image.svg assets/img/og-image.png 1200:630
  або https://cloudconvert.com/svg-to-png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0b0e14"/>
      <stop offset="1"   stop-color="#161b25"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.25" r="0.6">
      <stop offset="0"   stop-color="#4ad3a3" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#4ad3a3" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#4ad3a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#4ad3a3"/>
      <stop offset="1"   stop-color="#7aa2ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark (shield) -->
  <g transform="translate(80,80)">
    <path d="M40 0 L80 18 V52 C80 76 60 96 40 104 C20 96 0 76 0 52 V18 Z"
          fill="none" stroke="url(#accent)" stroke-width="4"/>
    <path d="M22 50 L36 64 L60 36" fill="none" stroke="#4ad3a3" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="155"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="56" font-weight="700" fill="#e6ecf5"
        letter-spacing="-1">Vartovy</text>

  <!-- Headline -->
  <text x="80" y="320"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="78" font-weight="700" fill="#e6ecf5"
        letter-spacing="-2">Your secrets,</text>
  <text x="80" y="410"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="78" font-weight="700" fill="url(#accent)"
        letter-spacing="-2">stay with you.</text>

  <!-- Subline -->
  <text x="80" y="478"
        font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="28" font-weight="400" fill="#98a3b6">
    Offline-first desktop vault · AES-256-GCM · Local encryption
  </text>

  <!-- Pills -->
  <g transform="translate(80,520)" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
     font-size="22" font-weight="600">
    <g>
      <rect width="200" height="48" rx="24" fill="rgba(74,211,163,0.12)" stroke="#4ad3a3" stroke-width="1.2"/>
      <text x="100" y="31" text-anchor="middle" fill="#4ad3a3">No cloud</text>
    </g>
    <g transform="translate(220,0)">
      <rect width="240" height="48" rx="24" fill="rgba(122,162,255,0.12)" stroke="#7aa2ff" stroke-width="1.2"/>
      <text x="120" y="31" text-anchor="middle" fill="#7aa2ff">No subscription</text>
    </g>
    <g transform="translate(480,0)">
      <rect width="220" height="48" rx="24" fill="rgba(255,180,84,0.12)" stroke="#ffb454" stroke-width="1.2"/>
      <text x="110" y="31" text-anchor="middle" fill="#ffb454">No tracking</text>
    </g>
  </g>

  <!-- Domain -->
  <text x="1120" y="600" text-anchor="end"
        font-family="ui-monospace, Menlo, Consolas, monospace"
        font-size="24" font-weight="500" fill="#6b7589">vartovy.app</text>
</svg>
