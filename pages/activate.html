<header class="site-header"><div class="container nav">
  <a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="" /><span>Vartovy</span></a>
  <nav><ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="features.html">Features</a></li><li><a href="security.html">Security</a></li><li><a href="pricing.html">Plans</a></li><li><a href="download.html">Download</a></li><li><a href="contact.html">Contact</a></li></ul></nav>

<main>
  <section class="hero"><div class="container text-center"><span class="eyebrow">Pro</span><h1>Активація Pro-ключа</h1><p class="lead" style="margin:0 auto;">Введіть ключ з листа після покупки.</p></div></section>
  <section class="section"><div class="container">
    <form class="activate-card" id="activate-form" autocomplete="off" style="max-width:560px;margin:0 auto;padding:2rem;border:1px solid var(--border);border-radius:14px;background:var(--surface)">
      <label for="license-key">Pro-ключ</label>
      <input type="text" id="license-key" name="license_key" required minlength="20" maxlength="64" placeholder="XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX" style="width:100%;padding:.75rem .9rem;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:inherit;margin-top:.35rem"/>
      <label for="action-type" style="display:block;margin-top:1rem">Дія</label>
      <select id="action-type" name="action" style="width:100%;padding:.75rem .9rem;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:inherit"><option value="activate">Активувати на цьому пристрої</option><option value="validate">Лише перевірити ключ</option></select>
      <div style="margin-top:1rem;display:flex;gap:.6rem;flex-wrap:wrap"><button type="submit" id="activate-submit" class="btn btn--primary">Перевірити</button><a class="btn btn--ghost" href="pricing.html">Я ще не купував Pro</a></div>
      <div id="activate-result" class="activate-result" hidden style="margin-top:1rem"></div>
      <p class="dim" style="margin-top:1rem">Проблеми з ключем? Напишіть на <a href="mailto:support@vartovy.app">support@vartovy.app</a>.</p>
    </form>
  </div></section>
</main>
